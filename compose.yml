services:
  web:
    image: node:22.5.1-bookworm
    restart: unless-stopped
    volumes:
      - ${WEBAPP_STORAGE_HOME}/site/wwwroot:/home/site/wwwroot
      - ./certs/${NUXT_HOSTNAME}.crt:/usr/local/share/ca-certificates/${NUXT_HOSTNAME}.crt
    command: /bin/sh -c "update-ca-certificates && node /home/site/wwwroot/server/index.mjs"
    ports:
      - 443:443
      # - 443:3000
